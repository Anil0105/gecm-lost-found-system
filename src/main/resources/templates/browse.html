<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Browse Items</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container page-section">
    <h3>Browse Items</h3>
    <form class="row g-2 mb-3" method="get" th:action="@{/browse}">
        <div class="col-auto">
            <select name="type" class="form-select">
                <option value="all" th:selected="${type == 'all'}">All</option>
                <option value="lost" th:selected="${type == 'lost'}">Lost</option>
                <option value="found" th:selected="${type == 'found'}">Found</option>
            </select>
        </div>
        <div class="col">
            <input name="q" th:value="${q}" class="form-control" placeholder="Search title, location, description">
        </div>
        <div class="col-auto">
            <button class="btn btn-primary">Search</button>
        </div>
    </form>

    <div class="row row-cols-1 row-cols-md-3 g-3">
        <div class="col" th:if="${#lists.isEmpty(items)}">
            <div class="alert alert-info">No items found.</div>
        </div>
        <div class="col" th:each="it : ${items}">
            <div class="card h-100">
                <img th:if="${it.image != null}" th:src="@{'/uploads/' + ${it.image}}"
                     class="card-img-top" style="height:180px;object-fit:cover;" alt="Item image">
                <div class="card-body">
                    <h5 class="card-title">
                        <span th:text="${it.title}">Title</span>
                        <small class="text-muted" th:text="${#strings.capitalize(it.type.name())}">Type</small>
                    </h5>
                    <p class="card-text" th:text="${#strings.substring(it.description, 0, #strings.length(it.description) > 150 ? 150 : #strings.length(it.description)) + (#strings.length(it.description) > 150 ? '...' : '')}">Description</p>
                    <p class="small text-muted">
                        <span th:text="${it.type.name() == 'lost' ? 'Lost at' : 'Found at'}">Label</span>:
                        <span th:text="${it.location}">Location</span>
                        &mdash; By: <span th:text="${it.addedName}">User</span>
                    </p>
                    <a th:href="@{/item/{id}(id=${it.id})}" class="btn btn-sm btn-outline-primary">View</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
