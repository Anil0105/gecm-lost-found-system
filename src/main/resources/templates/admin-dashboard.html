<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container page-section">
    <h3 class="mb-3">Admin Dashboard</h3>
    <div class="row">
        <div class="col-md-4">
            <div class="card mb-3">
                <div class="card-body">
                    <h5>Stats</h5>
                    <p th:text="'Total users: ' + ${totalUsers}">Total users</p>
                    <p th:text="'Total items: ' + ${totalItems}">Total items</p>
                    <p th:text="'Pending: ' + ${pendingItems} + ' | Approved: ' + ${approvedItems}">Pending / Approved</p>
                    <p th:text="'Claim requests: ' + ${requestedClaims}">Claim requests</p>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <h5>Users</h5>
            <div class="table-responsive">
                <table class="table">
                    <thead><tr><th>Name</th><th>Email</th></tr></thead>
                    <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.name}">Name</td>
                        <td th:text="${u.email}">Email</td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <h5>Items</h5>
            <div class="table-responsive">
                <table class="table">
                    <thead><tr><th>Type</th><th>Title</th><th>Added By</th><th>Status</th><th>Action</th></tr></thead>
                    <tbody>
                    <tr th:each="it : ${items}">
                        <td th:text="${#strings.capitalize(it.type.name())}">Type</td>
                        <td th:text="${it.title}">Title</td>
                        <td th:text="${it.addedName}">Added By</td>
                        <td th:text="${#strings.capitalize(it.status.name())}">Status</td>
                        <td>
                            <a th:if="${it.status.name() == 'pending'}" class="btn btn-sm btn-success"
                               th:href="@{/admin(action='approve', id=${it.id})}">Approve</a>
                            <a th:if="${it.status.name() == 'approved'}" class="btn btn-sm btn-secondary"
                               th:href="@{/admin(action='returned', id=${it.id})}">Mark Returned</a>
                            <a class="btn btn-sm btn-danger" th:href="@{/admin(action='delete', id=${it.id})}">Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
