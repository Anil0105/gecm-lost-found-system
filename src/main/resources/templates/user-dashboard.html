<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container page-section">
    <h3 th:text="'Welcome, ' + ${user.name}">Welcome</h3>
    <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>
    <div class="card mb-3">
        <div class="card-body">
            <h5>Add Lost/Found Item</h5>
            <form method="post" th:action="@{/dashboard/add-item}" enctype="multipart/form-data">
                <select name="type" class="form-select mb-2">
                    <option value="found">Found Item</option>
                    <option value="lost">Lost Item</option>
                </select>
                <input name="title" class="form-control mb-2" placeholder="Title" required>
                <input name="location" class="form-control mb-2" placeholder="Location" required>
                <textarea name="description" class="form-control mb-2" placeholder="Description" required></textarea>
                <input type="file" name="image" class="form-control mb-2" accept="image/*">
                <button class="btn btn-primary">Submit</button>
            </form>
        </div>
    </div>

    <h5>Your Items</h5>
    <div class="table-responsive">
        <table class="table">
            <thead>
            <tr><th>Type</th><th>Title</th><th>Location</th><th>Status</th><th>Action</th></tr>
            </thead>
            <tbody>
            <tr th:each="it : ${myItems}">
                <td th:text="${#strings.capitalize(it.type.name())}">Type</td>
                <td th:text="${it.title}">Title</td>
                <td th:text="${it.location}">Location</td>
                <td th:text="${#strings.capitalize(it.status.name())}">Status</td>
                <td>
                    <a th:if="${it.status.name() != 'deleted'}" th:href="@{/item/{id}(id=${it.id})}"
                       class="btn btn-sm btn-outline-primary">View</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
