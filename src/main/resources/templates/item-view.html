<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Item Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container page-section">
    <div class="row">
        <div class="col-md-6">
            <img th:if="${item.image != null}" th:src="@{'/uploads/' + ${item.image}}" class="img-fluid rounded" alt="Item image">
        </div>
        <div class="col-md-6">
            <h3>
                <span th:text="${item.title}">Title</span>
                <small class="text-muted" th:text="${#strings.capitalize(item.type.name())}">Type</small>
            </h3>
            <p th:text="${item.description}">Description</p>
            <p class="text-muted">
                <span th:text="${item.type.name() == 'lost' ? 'Lost at' : 'Found at'}">Label</span>:
                <span th:text="${item.location}">Location</span>
            </p>
            <p class="text-muted">Posted by: <span th:text="${item.addedName}">User</span></p>
            <div th:if="${item.status.name() != 'approved'}" class="alert alert-warning"
                 th:text="'This item is not public (status: ' + ${item.status.name()} + ').'"></div>
            <hr>
            <div th:if="${claimMsg}" class="alert alert-success" th:text="${claimMsg}"></div>
            <h5>Claim this item</h5>
            <form method="post" th:action="@{/item/{id}/claim(id=${item.id})}">
                <input name="claimerName" class="form-control mb-2" placeholder="Your name" required>
                <input name="claimerEmail" type="email" class="form-control mb-2" placeholder="Your email" required>
                <textarea name="message" class="form-control mb-2" placeholder="Optional message"></textarea>
                <button class="btn btn-primary">Send Claim</button>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
