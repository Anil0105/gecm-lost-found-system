<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Claim Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container page-section">
    <h3 class="mb-3">Claim Requests</h3>
    <div class="table-responsive">
        <table class="table">
            <thead><tr><th>Item</th><th>Claimer</th><th>Email</th><th>Message</th><th>Status</th><th>Action</th></tr></thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(claims)}">
                <td colspan="6" class="text-muted">No claim requests yet.</td>
            </tr>
            <tr th:each="claim : ${claims}">
                <td th:text="${claim.itemTitle}">Item</td>
                <td th:text="${claim.claimerName}">Claimer</td>
                <td th:text="${claim.claimerEmail}">Email</td>
                <td th:text="${claim.message}">Message</td>
                <td th:text="${#strings.capitalize(claim.status.name())}">Status</td>
                <td>
                    <th:block th:if="${claim.status.name() == 'requested'}">
                        <a class="btn btn-sm btn-success" th:href="@{/admin(action='verify_claim', id=${claim.id})}">Verify</a>
                        <a class="btn btn-sm btn-danger" th:href="@{/admin(action='reject_claim', id=${claim.id})}">Reject</a>
                    </th:block>
                    <span th:if="${claim.status.name() != 'requested'}" class="text-muted">No actions</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
